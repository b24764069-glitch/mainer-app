<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAINER PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #1c1c1e; --accent-color: #0a84ff; --success-color: #30d158; --text-color: #f5f5f7; --text-secondary: #86868b; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; overflow: hidden; height: 100vh; touch-action: none; }
        .page { display: none; height: 100vh; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-top: 15px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .miner-btn { width: 220px; height: 220px; background: radial-gradient(circle, #3498db, #2980b9); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 70px; cursor: pointer; margin: 40px auto; }
        .tab-bar-container { position: fixed; bottom: 20px; left: 10px; right: 10px; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; padding: 10px; z-index: 100; }
        .tab-item { flex: 1; text-align: center; cursor: pointer; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div id="tab-home" class="page active">
        <div style="text-align: center; font-size: 40px; margin-top: 20px;"> <span id="balance-display">0</span> 🪙 </div>
        <div class="miner-btn" id="target-clicker">⛏️</div>
    </div>

    <div id="tab-profile" class="page">
        <div class="card" style="text-align:center;">
            <div id="user-photo" style="width:80px; height:80px; background:#333; border-radius:50%; margin:0 auto;"></div>
            <h3 id="prof-username">User</h3>
            <p>ID: <span id="prof-id"></span></p>
        </div>
        <div class="card">
            <h4>Top 100 Leaders</h4>
            <div id="leaderboard"></div>
        </div>
    </div>

    <div id="tab-friend" class="page">
        <div class="card">
            <h4>My Friends</h4>
            <div id="friends-list">No friends yet.</div>
        </div>
    </div>

    <div class="tab-bar-container">
        <div class="tab-item" onclick="showPage('tab-home')">Home</div>
        <div class="tab-item" onclick="showPage('tab-friend')">Friends</div>
        <div class="tab-item" onclick="showPage('tab-profile')">Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // اتصال سریع اطلاعات تلگرام
        const user = tg.initDataUnsafe?.user || { id: 123456, first_name: "Player", username: "player1" };
        document.getElementById('prof-username').innerText = user.first_name + " (@" + user.username + ")";
        document.getElementById('prof-id').innerText = user.id;

        let state = { balance: 0, clickPower: 1 };

        // لیدربورد 100 نفر برتر (نمونه)
        const lb = document.getElementById('leaderboard');
        for(let i=1; i<=100; i++) {
            lb.innerHTML += `<div class="leaderboard-row"><span>${i}. User${i}</span><span>${(100-i)*100} 🪙</span></div>`;
        }

        // سیستم کلیک
        document.getElementById('target-clicker').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            state.balance += state.clickPower;
            document.getElementById('balance-display').innerText = Math.floor(state.balance).toLocaleString();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
