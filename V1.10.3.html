<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAINER PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #1c1c1e; --accent-color: #0a84ff; --success-color: #30d158; --text-color: #f5f5f7; --text-secondary: #86868b; --radius-card: 20px; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .page { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; display: none; width: 100%; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        .card { width: 100%; background: var(--card-bg); padding: 20px; border-radius: var(--radius-card); margin-bottom: 15px; }
        .miner-btn { width: 220px; height: 220px; background: radial-gradient(circle, #3498db, #2980b9); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 70px; cursor: pointer; transition: transform 0.1s; margin: 30px auto; }
        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(0, 0); } }
        .tab-bar-container { position: fixed; bottom: 20px; left: 10px; right: 10px; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; padding: 10px; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; cursor: pointer; color: var(--text-secondary); font-size: 11px; }
        .tab-item.active { color: var(--accent-color); }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; font-size: 13px; }
    </style>
</head>
<body>

    <div id="tab-home" class="page active">
        <div class="coin-balance" style="font-size: 40px; margin: 20px;"> <span id="balance-display">0</span> 🪙 </div>
        <div class="miner-btn" id="target-clicker">⛏️</div>
    </div>

    <div id="tab-profile" class="page">
        <div class="card" style="text-align:center;">
            <div id="user-photo" style="width:70px; height:70px; background:#333; border-radius:50%; margin:0 auto 10px;"></div>
            <h3 id="prof-username">Authenticating...</h3>
            <p>ID: <span id="prof-id"></span></p>
            <p>Username: <span id="prof-handle"></span></p>
        </div>
        <div class="card">
            <h4>Top 100 Miners</h4>
            <div id="leaderboard"></div>
        </div>
    </div>

    <div id="tab-friend" class="page">
        <div class="card">
            <h4>Friends List</h4>
            <div id="friends-list" style="color:var(--text-secondary)">No friends invited yet.</div>
        </div>
    </div>

    <div class="tab-bar-container">
        <div class="tab-item active" onclick="switchTabs('tab-home', this)">🏠 Home</div>
        <div class="tab-item" onclick="switchTabs('tab-friend', this)">💎 Friends</div>
        <div class="tab-item" onclick="switchTabs('tab-profile', this)">👤 Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // اتصال فوری به اکانت تلگرام
        const user = tg.initDataUnsafe?.user || { id: 0, first_name: "Guest", username: "guest" };
        document.getElementById('prof-username').innerText = user.first_name;
        document.getElementById('prof-id').innerText = user.id;
        document.getElementById('prof-handle').innerText = "@" + (user.username || "n/a");

        let state = { balance: 0, clickPower: 1 };

        // بارگذاری لیدربورد 100 نفر برتر
        const lb = document.getElementById('leaderboard');
        for(let i=1; i<=100; i++) {
            lb.innerHTML += `<div class="leaderboard-row"><span>${i}. Miner_${i}</span><span>${(101-i)*5000} 🪙</span></div>`;
        }

        // سیستم کلیک
        document.getElementById('target-clicker').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            state.balance += state.clickPower;
            document.getElementById('balance-display').innerText = Math.floor(state.balance).toLocaleString();
            const btn = e.target;
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 200);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function switchTabs(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
